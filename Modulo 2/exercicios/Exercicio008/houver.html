<!DOCTYPE html>
<html lang="pt-br">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
                    <title>Tipos de Hover</title>
                    <style>
                        body{
                             font-family: Arial, Helvetica, sans-serif;           
                        }
                        div>p{
                            display: none;
                        }
                        div:hover>p{
                            display: block;
                            color: chartreuse;
                            background-color: black;
                            width: 300px;
                        }
                        div:hover{
                            color: red;
                            font-size: 30px;
                        }               
                    </style>
</head>
<body>
                    <h1>Exemplos de Hover</h1>
                    <p>Passe o Mouse sobre o texto a baixo</p>
                    <div>Passe o mouse aqui
                         <p>TEXTO ESCONDIDO</p>               
                    </div>

                    
</body>
</html>
